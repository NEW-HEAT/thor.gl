<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <!-- Accent glow -->
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <!-- Hand skeleton glow -->
    <filter id="handglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Globe grid -->
    <clipPath id="globeClip">
      <circle cx="920" cy="320" r="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1280" height="640" fill="url(#dots)"/>
  </g>

  <!-- Globe wireframe (right side) -->
  <g clip-path="url(#globeClip)" opacity="0.15">
    <!-- Longitude lines -->
    <ellipse cx="920" cy="320" rx="200" ry="200" fill="none" stroke="#60a5fa" stroke-width="0.8"/>
    <ellipse cx="920" cy="320" rx="140" ry="200" fill="none" stroke="#60a5fa" stroke-width="0.6"/>
    <ellipse cx="920" cy="320" rx="70" ry="200" fill="none" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="720" y1="320" x2="1120" y2="320" stroke="#60a5fa" stroke-width="0.5"/>
    <!-- Latitude lines -->
    <ellipse cx="920" cy="320" rx="200" ry="200" fill="none" stroke="#60a5fa" stroke-width="0.8"/>
    <ellipse cx="920" cy="250" rx="190" ry="50" fill="none" stroke="#60a5fa" stroke-width="0.5"/>
    <ellipse cx="920" cy="390" rx="190" ry="50" fill="none" stroke="#60a5fa" stroke-width="0.5"/>
    <ellipse cx="920" cy="180" rx="150" ry="30" fill="none" stroke="#60a5fa" stroke-width="0.4"/>
    <ellipse cx="920" cy="460" rx="150" ry="30" fill="none" stroke="#60a5fa" stroke-width="0.4"/>
  </g>
  <!-- Globe outline -->
  <circle cx="920" cy="320" r="200" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.2"/>
  <!-- Globe glow -->
  <circle cx="920" cy="320" r="200" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.08" filter="url(#handglow)"/>

  <!-- Hand skeleton (left-center, reaching toward globe) -->
  <g filter="url(#handglow)" transform="translate(540, 220) scale(1.2)">
    <!-- Wrist to fingers - amber/gold color scheme -->
    <!-- Palm connections -->
    <line x1="80" y1="180" x2="50" y2="120" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <line x1="80" y1="180" x2="80" y2="100" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <line x1="80" y1="180" x2="110" y2="105" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <line x1="80" y1="180" x2="135" y2="120" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <line x1="80" y1="180" x2="155" y2="150" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>

    <!-- Index finger -->
    <line x1="50" y1="120" x2="35" y2="70" stroke="#fbbf24" stroke-width="1.8" opacity="0.8"/>
    <line x1="35" y1="70" x2="25" y2="30" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
    <line x1="25" y1="30" x2="20" y2="0" stroke="#fbbf24" stroke-width="1.2" opacity="0.9"/>

    <!-- Middle finger -->
    <line x1="80" y1="100" x2="78" y2="48" stroke="#fbbf24" stroke-width="1.8" opacity="0.8"/>
    <line x1="78" y1="48" x2="76" y2="8" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
    <line x1="76" y1="8" x2="75" y2="-22" stroke="#fbbf24" stroke-width="1.2" opacity="0.9"/>

    <!-- Ring finger -->
    <line x1="110" y1="105" x2="118" y2="55" stroke="#fbbf24" stroke-width="1.8" opacity="0.8"/>
    <line x1="118" y1="55" x2="124" y2="18" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
    <line x1="124" y1="18" x2="128" y2="-8" stroke="#fbbf24" stroke-width="1.2" opacity="0.9"/>

    <!-- Pinky -->
    <line x1="135" y1="120" x2="152" y2="80" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
    <line x1="152" y1="80" x2="163" y2="50" stroke="#fbbf24" stroke-width="1.3" opacity="0.7"/>
    <line x1="163" y1="50" x2="170" y2="30" stroke="#fbbf24" stroke-width="1.1" opacity="0.8"/>

    <!-- Thumb -->
    <line x1="80" y1="180" x2="30" y2="160" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <line x1="30" y1="160" x2="0" y2="135" stroke="#fbbf24" stroke-width="1.8" opacity="0.7"/>
    <line x1="0" y1="135" x2="-15" y2="115" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>

    <!-- Knuckle connections -->
    <line x1="50" y1="120" x2="80" y2="100" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <line x1="80" y1="100" x2="110" y2="105" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <line x1="110" y1="105" x2="135" y2="120" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>

    <!-- Fingertip dots (bright) -->
    <circle cx="20" cy="0" r="4" fill="#fbbf24" opacity="0.9"/>
    <circle cx="75" cy="-22" r="4" fill="#fbbf24" opacity="0.9"/>
    <circle cx="128" cy="-8" r="4" fill="#fbbf24" opacity="0.9"/>
    <circle cx="170" cy="30" r="3.5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="-15" cy="115" r="3.5" fill="#fbbf24" opacity="0.8"/>

    <!-- Joint dots -->
    <circle cx="80" cy="180" r="3" fill="#f59e0b" opacity="0.6"/>
    <circle cx="50" cy="120" r="2.5" fill="#f59e0b" opacity="0.5"/>
    <circle cx="80" cy="100" r="2.5" fill="#f59e0b" opacity="0.5"/>
    <circle cx="110" cy="105" r="2.5" fill="#f59e0b" opacity="0.5"/>
    <circle cx="135" cy="120" r="2.5" fill="#f59e0b" opacity="0.5"/>
  </g>

  <!-- Connection lines from fingertips to globe (subtle) -->
  <g opacity="0.08">
    <line x1="690" y1="198" x2="780" y2="260" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,8"/>
    <line x1="730" y1="196" x2="800" y2="250" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,8"/>
    <line x1="694" y1="214" x2="790" y2="270" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,8"/>
  </g>

  <!-- Title text -->
  <text x="100" y="300" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="96" font-weight="700" fill="white" letter-spacing="-2">
    thor.gl
  </text>

  <!-- Tagline -->
  <text x="104" y="350" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#a1a1aa" letter-spacing="0.5">
    Hand gesture control for deck.gl
  </text>

  <!-- Gesture pills -->
  <g transform="translate(100, 380)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="45" y="18" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#fcd34d" text-anchor="middle">pinch-pan</text>

    <rect x="100" y="0" width="100" height="28" rx="14" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="150" y="18" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#fcd34d" text-anchor="middle">pinch-zoom</text>

    <rect x="210" y="0" width="110" height="28" rx="14" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="265" y="18" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#fcd34d" text-anchor="middle">pinch-rotate</text>

    <rect x="330" y="0" width="60" height="28" rx="14" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="360" y="18" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#93c5fd" text-anchor="middle">fist</text>
  </g>

  <!-- Bottom attribution -->
  <text x="100" y="560" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#71717a" letter-spacing="0.5">
    MIT · MediaPipe + deck.gl · Built by NEWHEAT
  </text>

  <!-- Subtle top border accent -->
  <rect x="0" y="0" width="1280" height="2" fill="#f59e0b" opacity="0.4"/>
</svg>
